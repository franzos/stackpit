<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}Stackpit{% endblock %}</title>
    <link rel="stylesheet" href="/web/_assets/style.css">
    <script src="/web/_assets/bulk.js" defer></script>
    <script src="/web/_assets/confirm.js" defer></script>
    <script src="/web/_assets/stop-propagation.js" defer></script>
</head>
<body>
    <header>
        <nav aria-label="Breadcrumb">
            <a href="/web/projects/" class="nav-logo"><img src="/web/_assets/icon.svg" alt="Stackpit" width="24" height="24"> Stackpit</a>
            {% block breadcrumbs %}{% endblock %}
            <a href="/web/settings/integrations/" class="nav-settings" style="margin-left: auto; font-size: 0.85rem;">Settings</a>
            <a href="/web/settings/defaults/" style="font-size: 0.85rem; margin-left: 0.5rem;">Defaults</a>
            <form method="post" action="/web/logout" style="display:inline;margin-left:0.75rem"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button type="submit" style="background:none;border:none;cursor:pointer;color:inherit;font-size:0.85rem;padding:0;opacity:0.7">Logout</button></form>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>Stackpit</small>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
