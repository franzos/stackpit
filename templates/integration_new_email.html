{% extends "base.html" %}

{% block title %}Add Postmark Email - Stackpit{% endblock %}

{% block breadcrumbs %}
<span class="sep" aria-hidden="true">/</span>
<a href="/web/settings/integrations/">Settings</a>
<span class="sep" aria-hidden="true">/</span>
<span>Add Postmark Email</span>
{% endblock %}

{% block content %}
<h1>Add Postmark Email Integration</h1>

<p><a href="/web/settings/integrations/">&larr; Back to Integrations</a></p>

<form class="settings-form" method="post" action="/web/settings/integrations/create">
    <input type="hidden" name="kind" value="email">

    <label for="int_name">Name</label>
    <input type="text" id="int_name" name="name" placeholder="e.g. Team Email Alerts" required>

    <label for="int_url">Postmark API URL</label>
    <input type="url" id="int_url" name="url" value="https://api.postmarkapp.com/email" required>

    <label for="int_secret">Postmark Server Token</label>
    <input type="password" id="int_secret" name="secret" placeholder="Server token" required>

    <label for="int_from">From Address</label>
    <input type="email" id="int_from" name="from_address" placeholder="alerts@example.com" required>

    <button type="submit" class="btn">Create Integration</button>
</form>
{% endblock %}
